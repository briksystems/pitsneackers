const fmtCOP = (n) =>
  new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0);

const shortCode = (text) => {
  if (!text) return '';
  return text
    .split(/\s+/)
    .filter(Boolean)
    .map((w) => w[0].toUpperCase())
    .join('')
    .slice(0, 4);
};

function computeSerial(draft, existingItems) {
  let base = '';
  const colorCode = shortCode(draft.colorway);

  if (draft.brand === 'Jordan') {
    const num = draft.model.replace('Jordan', '').trim();
    const variantCode = { Low: 'L', Mid: 'M', High: 'H', Standard: '' }[draft.variant] || '';
    const editionCode = { Retro: '', 'Travis Scott': 'TRV', 'J Balvin': 'BLV', 'Off-White': 'OW' }[draft.edition] || '';
    base = `J${num}${variantCode}${editionCode}`;
  } else if (draft.brand === 'Nike') {
    const modelMap = {
      'Air Force 1': 'AF1', 'Air Max': 'AM', Dunk: 'DK',
      'Nike Mind 001': 'MND1', 'Nike Mind 002': 'MND2',
    };
    base = `N${modelMap[draft.model] || shortCode(draft.model)}`;
  } else if (draft.brand === 'Supreme') {
    const catMap = { Sacos: 'SC', Gorras: 'GR', Pantalones: 'PT', Zapatos: 'ZP', Colaboraciones: 'CL' };
    base = `S${catMap[draft.model] || 'XX'}`;
  } else if (draft.brand === 'Adidas') {
    base = `AD${shortCode(draft.model)}`;
  } else if (draft.brand === 'Converse') {
    base = `CV${shortCode(draft.model)}`;
  } else if (draft.brand === 'New Balance') {
    base = `NB${shortCode(draft.model)}`;
  }

  const baseKey = `${base}${colorCode}`;
  const count = existingItems.filter((it) => it.serial && it.serial.startsWith(baseKey)).length;
  return `${baseKey}${count + 1}`;
}

function dropStatus(dateStr) {
  const target = new Date(`${dateStr}T00:00:00`);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const days = Math.round((target - today) / 86400000);
  if (days > 1) return { text: `Faltan ${days} días`, urgent: false, past: false };
  if (days === 1) return { text: 'Mañana', urgent: true, past: false };
  if (days === 0) return { text: '¡HOY SALE!', urgent: true, past: false };
  return { text: 'Ya disponible', urgent: false, past: true };
}

/* ---------------------------- storage helpers --------------------------- */

const hasCloudStorage = typeof window !== 'undefined' && !!window.storage;

async function loadKey(key) {
  try {
    if (hasCloudStorage) {
      const res = await window.storage.get(key, true);
      return res ? JSON.parse(res.value) : null;
    }
    const raw = localStorage.getItem(`pitsneakers_${key}`);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

async function saveKey(key, value) {
  try {
    if (hasCloudStorage) {
      await window.storage.set(key, JSON.stringify(value), true);
    } else {
      localStorage.setItem(`pitsneakers_${key}`, JSON.stringify(value));
    }
  } catch (e) {
    console.error('No se pudo guardar', key, e);
  }
}

    }
  });

  return { items, sales };
}

/* --------------------------------- app ----------------------------------- */

function App() {
  const [ready, setReady] = useState(false);
  const [inventory, setInventory] = useState([]);
  const [sales, setSales] = useState([]);
  const [view, setView] = useState('tienda');
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);

  const [brandFilter, setBrandFilter] = useState('Todas');
  const [subFilter, setSubFilter] = useState(null);
  const [minPrice, setMinPrice] = useState('');
  const [maxPrice, setMaxPrice] = useState('');
  const [sizeFilter, setSizeFilter] = useState([]);
  const [search, setSearch] = useState('');

  const emptyDraft = {
    brand: 'Jordan', model: 'Jordan 1', variant: 'Standard', edition: 'Retro',
    colorway: '', size: '', price: '', sellerName: '', sellerContact: '',
  };
  const [draft, setDraft] = useState(emptyDraft);
  const [sellModalItem, setSellModalItem] = useState(null);
  const [sellPrice, setSellPrice] = useState('');
  const [buyerContact, setBuyerContact] = useState('');

  useEffect(() => {
    (async () => {
      const inv = await loadKey('inventario');
      const sal = await loadKey('ventas');
      if (inv && sal) {
        setInventory(inv);
        setSales(sal);
      } else {
        const seed = buildSeed();
        setInventory(seed.items);
        setSales(seed.sales);
        saveKey('inventario', seed.items);
        saveKey('ventas', seed.sales);
      }
      setReady(true);
    })();
  }, []);

  const persistInventory = useCallback((next) => {
    setInventory(next);
    saveKey('inventario', next);
  }, []);

  const persistSales = useCallback((next) => {
    setSales(next);
    saveKey('ventas', next);
  }, []);

  const available = useMemo(() => inventory.filter((it) => it.status === 'disponible'), [inventory]);

  const filtered = useMemo(() => {
    return available.filter((it) => {
      if (brandFilter !== 'Todas' && it.brand !== brandFilter) return false;
      if (brandFilter === 'Jordan' && subFilter) {
        if (subFilter.type === 'model' && it.model !== subFilter.value) return false;
        if (subFilter.type === 'edition' && it.edition !== subFilter.value) return false;
      }
      if (brandFilter === 'Supreme' && subFilter && it.model !== subFilter.value) return false;
      if (minPrice && it.price < Number(minPrice)) return false;
      if (maxPrice && it.price > Number(maxPrice)) return false;
      if (sizeFilter.length > 0 && !sizeFilter.includes(Number(it.size))) return false;
      if (search) {
        const hay = `${it.brand} ${it.model} ${it.edition || ''} ${it.colorway || ''}`.toLowerCase();
        if (!hay.includes(search.toLowerCase())) return false;
      }
      return true;
    });
  }, [available, brandFilter, subFilter, minPrice, maxPrice, sizeFilter, search]);

  const handleOrder = (item) => {
    const msg =
      `Hola! Quiero este par 👟\n\n` +
      `${item.brand} ${item.model}${item.variant && item.variant !== 'Standard' ? ' ' + item.variant : ''}${item.edition && item.edition !== 'Retro' ? ' x ' + item.edition : ''}\n` +
      `${item.colorway ? 'Color: ' + item.colorway + '\n' : ''}` +
      `Talla: ${item.size}\n` +
      `Precio: ${fmtCOP(item.price)}\n` +
      `Código: ${item.serial}\n\n¿Sigue disponible?`;
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  };

  const handleGenericContact = (mensaje) => {
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
  };

  const submitDraft = (e) => {
    e.preventDefault();
    if (!draft.size || !draft.price || !draft.sellerName || !draft.sellerContact) return;
    const serial = computeSerial(draft, inventory);
    const newItem = {
      id: `it-${Date.now()}`,
      status: 'disponible',
      dateAdded: new Date().toISOString().slice(0, 10),
      serial,
      ...draft,
      price: Number(draft.price),
    };
    persistInventory([newItem, ...inventory]);
    setDraft({ ...emptyDraft });
  };

  const openSellModal = (item) => {
    setSellModalItem(item);
    setSellPrice(String(item.price));
    setBuyerContact('');
  };

  const confirmSale = () => {
    if (!buyerContact || !sellPrice) return;
    const item = sellModalItem;
    const finalPrice = Number(sellPrice);
    const sale = {
      id: `sale-${Date.now()}`,
      serial: item.serial,
      resumen: `${item.brand} ${item.model} ${item.colorway ? '· ' + item.colorway : ''} · Talla ${item.size}`,
      buyerContact,
      sellerName: item.sellerName,
      sellerContact: item.sellerContact,
      salePrice: finalPrice,
      commission: COMMISSION,
      sellerPayout: finalPrice - COMMISSION,
      date: new Date().toISOString().slice(0, 10),
    };
    persistSales([sale, ...sales]);
    persistInventory(inventory.map((it) => (it.id === item.id ? { ...it, status: 'vendido' } : it)));
    setSellModalItem(null);
  };

  const removeItem = (id) => {
    persistInventory(inventory.filter((it) => it.id !== id));
  };

  const exportExcel = (rows, filename, sheetName) => {
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename);
  };

  const totalComision = sales.reduce((acc, s) => acc + s.commission, 0);

  if (!ready) {
    return (
      <div className="min-h-[400px] flex items-center justify-center" style={{ background: INK, color: CREAM }}>
        Cargando catálogo…
      </div>
    );
  }

  return (
    <div style={{ fontFamily: "'Inter', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Titan+One&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
      `}</style>

      {view === 'tienda' ? (
        <Storefront
          drops={DROPS}
          brandFilter={brandFilter} setBrandFilter={setBrandFilter}
          subFilter={subFilter} setSubFilter={setSubFilter}
          minPrice={minPrice} setMinPrice={setMinPrice}
          maxPrice={maxPrice} setMaxPrice={setMaxPrice}
          sizeFilter={sizeFilter} setSizeFilter={setSizeFilter}
          search={search} setSearch={setSearch}
          filtered={filtered}
          onOrder={handleOrder}
          onGenericContact={handleGenericContact}
          goAdmin={() => setView('admin')}
        />
      ) : (
        <AdminPanel
          adminUnlocked={adminUnlocked}
          pinInput={pinInput} setPinInput={setPinInput}
          pinError={pinError}
          onUnlock={() => {
            if (pinInput === '2026') { setAdminUnlocked(true); setPinError(false); }
            else setPinError(true);
          }}
          onExit={() => setView('tienda')}
          inventory={inventory}
          sales={sales}
          draft={draft} setDraft={setDraft}
          submitDraft={submitDraft}
          openSellModal={openSellModal}
          removeItem={removeItem}
          exportExcel={exportExcel}
          totalComision={totalComision}
        />
      )}

      {sellModalItem && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(43,22,13,0.75)' }}>
          <div className="w-full max-w-sm rounded-md p-5" style={{ background: CREAM }}>
            <h3 className="text-lg font-extrabold mb-1" style={{ color: INK, fontFamily: "'Baloo 2', sans-serif" }}>
              Marcar como vendido
            </h3>
            <p className="text-sm mb-4" style={{ color: '#6B5B47' }}>
              {sellModalItem.brand} {sellModalItem.model} · {sellModalItem.serial}
            </p>
            <label className="block text-xs font-semibold mb-1" style={{ color: '#6B5B47' }}>Precio final de venta (COP)</label>
            <input
              type="number" value={sellPrice} onChange={(e) => setSellPrice(e.target.value)}
              className="w-full mb-3 px-3 py-2 rounded-md text-sm" style={{ border: '1px solid #DCC9A8' }}
            />
            <label className="block text-xs font-semibold mb-1" style={{ color: '#6B5B47' }}>Contacto del comprador</label>
            <input
              type="text" value={buyerContact} onChange={(e) => setBuyerContact(e.target.value)}
              placeholder="Nombre o número de WhatsApp"
              className="w-full mb-4 px-3 py-2 rounded-md text-sm" style={{ border: '1px solid #DCC9A8' }}
            />
            <div className="flex gap-2">
              <button onClick={() => setSellModalItem(null)} className="flex-1 py-2 rounded-md text-sm font-bold" style={{ border: '1px solid #DCC9A8', color: INK }}>
                Cancelar
              </button>
              <button onClick={confirmSale} className="flex-1 py-2 rounded-md text-sm font-bold flex items-center justify-center gap-1" style={{ background: RUST, color: CREAM }}>
                <Icon name="Check" size={16} /> Confirmar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <h3 className="font-extrabold mb-3 text-sm uppercase tracking-wide" style={{ color: CREAM, fontFamily: "'Baloo 2', sans-serif" }}>Medios de pago</h3>
          <div className="flex flex-wrap gap-2">
            {PAYMENT_METHODS.map((m) => (
              <span key={m} className="text-xs font-semibold px-3 py-1.5 rounded-full" style={{ background: INK, color: '#E8DAC0' }}>{m}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Storefront(props) {
  const {
    drops, brandFilter, setBrandFilter, subFilter, setSubFilter,
    minPrice, setMinPrice, maxPrice, setMaxPrice, sizeFilter, setSizeFilter,
    search, setSearch, filtered, onOrder, onGenericContact, goAdmin,
  } = props;

  return (
    <div style={{ background: CREAM, minHeight: '100%' }}>
      {/* Ticker de lanzamientos */}
      <div className="py-2 overflow-hidden" style={{ background: RUST }}>
        <div className="flex gap-8 px-4 flex-wrap justify-center">
          {drops.map((d) => {
            const s = dropStatus(d.date);
            if (s.past) return null;
            return (
              <div key={d.id} className="flex items-center gap-2 text-xs whitespace-nowrap">
                <Icon name="Clock" size={12} color={s.urgent ? '#FFE8A3' : CREAM} />
                <span style={{ color: CREAM }}>{d.title}</span>
                <span className="font-extrabold" style={{ color: s.urgent ? '#FFE8A3' : INK }}>{s.text}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Header */}
      <div className="flex items-center justify-between px-5 py-4 max-w-6xl mx-auto">
        <div className="flex items-center gap-3">
          <img src={MASCOT_B64} alt="Mascota Pitsneakers" className="w-12 h-12 object-contain" />
          <div>
            <h1 className="text-2xl md:text-3xl tracking-tight" style={{ color: INK, fontFamily: "'Titan One', sans-serif" }}>PITSNEAKERS</h1>
            <p className="text-[11px] uppercase tracking-widest" style={{ color: '#9A8258' }}>Sneakers Dealers</p>
          </div>
        </div>
        <button onClick={goAdmin} className="text-xs font-bold flex items-center gap-1 px-3 py-2 rounded-md" style={{ border: `1.5px solid ${INK}`, color: INK }}>
          <Icon name="Lock" size={12} /> Panel interno
        </button>
      </div>

      {/* Hero */}
      <div className="px-5 max-w-6xl mx-auto pb-8">
        <p className="text-3xl md:text-5xl leading-[1.05] max-w-2xl" style={{ color: INK, fontFamily: "'Titan One', sans-serif" }}>
          La comunidad que está cambiando el sneaker game en Colombia.
        </p>
        <p className="mt-3 max-w-xl text-sm md:text-base" style={{ color: '#6B5B47' }}>
          Compra, vende e intercambia pares 100% verificados. Cada par que ves aquí lleva el pin de autenticidad de PITS. Elige tu talla y reserva directo por WhatsApp.
        </p>
      </div>

      {/* Filtros */}
      <div className="px-5 max-w-6xl mx-auto pb-4 flex flex-col gap-3">
        <div className="flex flex-wrap gap-2">
          <Chip active={brandFilter === 'Todas'} onClick={() => { setBrandFilter('Todas'); setSubFilter(null); }}>Todas</Chip>
          {BRANDS.map((b) => (
            <Chip key={b} active={brandFilter === b} onClick={() => { setBrandFilter(b); setSubFilter(null); }}>{b}</Chip>
          ))}
        </div>

        {brandFilter === 'Jordan' && (
          <div className="flex flex-wrap gap-2">
            {JORDAN_MODELS.map((m) => (
              <Chip key={m} active={subFilter?.type === 'model' && subFilter.value === m} onClick={() => setSubFilter(subFilter?.value === m ? null : { type: 'model', value: m })}>
                {m.replace('Jordan ', '')}
              </Chip>
            ))}
            {JORDAN_EDITIONS.filter((e) => e !== 'Retro').map((e) => (
              <Chip key={e} active={subFilter?.type === 'edition' && subFilter.value === e} onClick={() => setSubFilter(subFilter?.value === e ? null : { type: 'edition', value: e })}>
                x {e}
              </Chip>
            ))}
          </div>
        )}

        {brandFilter === 'Supreme' && (
          <div className="flex flex-wrap gap-2">
            {SUPREME_CATS.map((c) => (
              <Chip key={c} active={subFilter?.value === c} onClick={() => setSubFilter(subFilter?.value === c ? null : { type: 'cat', value: c })}>
                {c}
              </Chip>
            ))}
          </div>
        )}

        <div className="flex flex-wrap gap-3 items-center">
          <div className="relative">
            <Icon name="Search" size={14} className="absolute left-2 top-1/2 -translate-y-1/2" color="#9A8258" />
            <input
              value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar modelo o color…"
              className="pl-7 pr-3 py-1.5 rounded-full text-sm" style={{ border: '1px solid #DCC9A8', background: '#FFFDF6' }}
            />
          </div>
          <input
            type="number" placeholder="Precio mín." value={minPrice} onChange={(e) => setMinPrice(e.target.value)}
            className="w-28 px-3 py-1.5 rounded-full text-sm" style={{ border: '1px solid #DCC9A8', background: '#FFFDF6' }}
          />
          <input
            type="number" placeholder="Precio máx." value={maxPrice} onChange={(e) => setMaxPrice(e.target.value)}
            className="w-28 px-3 py-1.5 rounded-full text-sm" style={{ border: '1px solid #DCC9A8', background: '#FFFDF6' }}
          />
          <div className="flex flex-wrap gap-1">
            {SIZE_OPTIONS.map((s) => (
              <button
                key={s}
                onClick={() => setSizeFilter(sizeFilter.includes(s) ? sizeFilter.filter((x) => x !== s) : [...sizeFilter, s])}
                className="px-2 py-1 rounded text-xs font-bold"
                style={sizeFilter.includes(s) ? { background: INK, color: CREAM } : { background: '#FFFDF6', color: INK, border: '1px solid #DCC9A8' }}
              >
                {s}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Grid */}
      <div className="px-5 max-w-6xl mx-auto pb-14">
        {filtered.length === 0 ? (
          <p className="text-center py-16 text-sm" style={{ color: '#9A8258' }}>No hay pares que cumplan con esos filtros por ahora.</p>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map((it) => <ProductCard key={it.id} item={it} onOrder={onOrder} />)}
          </div>
        )}
      </div>

      <ComoFunciona onGenericContact={onGenericContact} />

      <div className="text-center py-4 text-[11px]" style={{ color: '#9A8258', background: CREAM }}>
        Prototipo de preview — nombre real, colores y proceso tomados del manual de Pitsneakers.
      </div>
    </div>
  );
}

/* --------------------------------- Admin ---------------------------------- */

function AdminPanel(props) {
  const {
    adminUnlocked, pinInput, setPinInput, pinError, onUnlock, onExit,
    inventory, sales, draft, setDraft, submitDraft, openSellModal, removeItem,
    exportExcel, totalComision,
  } = props;

  if (!adminUnlocked) {
    return (
      <div className="min-h-[500px] flex items-center justify-center p-6" style={{ background: INK }}>
        <div className="w-full max-w-xs">
          <button onClick={onExit} className="text-xs flex items-center gap-1 mb-6" style={{ color: '#C9B49A' }}>
            <Icon name="ArrowLeft" size={14} /> Volver a la tienda
          </button>
          <h2 className="text-2xl font-extrabold mb-1" style={{ color: CREAM, fontFamily: "'Titan One', sans-serif" }}>Panel interno</h2>
          <p className="text-xs mb-4" style={{ color: '#C9B49A' }}>Solo para el equipo PITS. Este PIN es un filtro simple, no seguridad real.</p>
          <input
            type="password" value={pinInput} onChange={(e) => setPinInput(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && onUnlock()}
            placeholder="PIN"
            className="w-full px-3 py-2 rounded-md text-sm mb-2" style={{ border: '1px solid #4A2E1C', background: '#241509', color: CREAM }}
          />
          {pinError && <p className="text-xs mb-2" style={{ color: '#E8846B' }}>PIN incorrecto.</p>}
          <button onClick={onUnlock} className="w-full py-2 rounded-md text-sm font-bold" style={{ background: TEAL, color: INK }}>
            Entrar
          </button>
        </div>
      </div>
    );
  }

  const disponibles = inventory.filter((i) => i.status === 'disponible');

  const modelOptions = () => {
    if (draft.brand === 'Jordan') return JORDAN_MODELS;
    if (draft.brand === 'Nike') return NIKE_MODELS;
    if (draft.brand === 'Supreme') return SUPREME_CATS;
    return null;
  };

  return (
    <div style={{ background: '#180D07', minHeight: '100%' }}>
      <div className="flex items-center justify-between px-5 py-4 max-w-6xl mx-auto">
        <div>
          <h2 className="text-2xl font-extrabold" style={{ color: CREAM, fontFamily: "'Titan One', sans-serif" }}>Panel interno</h2>
          <p className="text-xs" style={{ color: '#C9B49A' }}>Stock, seriales y ventas — PITS</p>
        </div>
        <button onClick={onExit} className="text-xs font-bold flex items-center gap-1 px-3 py-2 rounded-md" style={{ border: '1px solid #4A2E1C', color: CREAM }}>
          <Icon name="ArrowLeft" size={14} /> Volver a la tienda
        </button>
      </div>

      <div className="px-5 max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8">
        <Stat icon={Package} label="Pares disponibles" value={disponibles.length} accent={TEAL} />
        <Stat icon={ShoppingBag} label="Pares vendidos (histórico)" value={sales.length} accent="#E8846B" />
        <Stat icon={TrendingUp} label="Comisión acumulada" value={fmtCOP(totalComision)} accent="#C9A227" />
      </div>

      {/* Formulario agregar par */}
      <div className="px-5 max-w-6xl mx-auto mb-10">
        <h3 className="text-lg font-extrabold mb-3" style={{ color: CREAM, fontFamily: "'Baloo 2', sans-serif" }}>Agregar par al stock</h3>
        <form onSubmit={submitDraft} className="grid grid-cols-1 md:grid-cols-3 gap-3 p-4 rounded-md" style={{ background: '#241509', border: '1px solid #4A2E1C' }}>
          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Marca</label>
            <select
              value={draft.brand}
              onChange={(e) => {
                const brand = e.target.value;
                const base = { ...draft, brand, colorway: '', size: '' };
                if (brand === 'Jordan') { base.model = 'Jordan 1'; base.variant = 'Standard'; base.edition = 'Retro'; }
                else if (brand === 'Nike') base.model = 'Air Force 1';
                else if (brand === 'Supreme') base.model = 'Gorras';
                else base.model = '';
                setDraft(base);
              }}
              className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }}
            >
              {BRANDS.map((b) => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Modelo</label>
            {modelOptions() ? (
              <select
                value={draft.model}
                onChange={(e) => setDraft({ ...draft, model: e.target.value })}
                className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }}
              >
                {modelOptions().map((m) => <option key={m} value={m}>{m}</option>)}
              </select>
            ) : (
              <input
                value={draft.model} onChange={(e) => setDraft({ ...draft, model: e.target.value })}
                placeholder="Ej. Samba OG"
                className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }}
              />
            )}
          </div>

          {draft.brand === 'Jordan' && (
            <>
              <div>
                <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Corte</label>
                <select value={draft.variant} onChange={(e) => setDraft({ ...draft, variant: e.target.value })} className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }}>
                  {JORDAN_VARIANTS.map((v) => <option key={v} value={v}>{v}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Edición</label>
                <select value={draft.edition} onChange={(e) => setDraft({ ...draft, edition: e.target.value })} className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }}>
                  {JORDAN_EDITIONS.map((v) => <option key={v} value={v}>{v}</option>)}
                </select>
              </div>
            </>
          )}

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Color / detalle</label>
            <input value={draft.colorway} onChange={(e) => setDraft({ ...draft, colorway: e.target.value })} placeholder="Ej. Shy Pink" className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }} />
          </div>

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Talla</label>
            <input value={draft.size} onChange={(e) => setDraft({ ...draft, size: e.target.value })} placeholder="9.5 o M / Única" className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }} />
          </div>

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Precio (COP)</label>
            <input type="number" value={draft.price} onChange={(e) => setDraft({ ...draft, price: e.target.value })} className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }} />
          </div>

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Nombre del vendedor</label>
            <input value={draft.sellerName} onChange={(e) => setDraft({ ...draft, sellerName: e.target.value })} className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }} />
          </div>

          <div>
            <label className="block text-xs mb-1" style={{ color: '#C9B49A' }}>Contacto del vendedor</label>
            <input value={draft.sellerContact} onChange={(e) => setDraft({ ...draft, sellerContact: e.target.value })} className="w-full px-2 py-2 rounded-md text-sm" style={{ background: INK, color: CREAM, border: '1px solid #4A2E1C' }} />
          </div>

          <div className="flex items-end">
            <button type="submit" className="w-full py-2 rounded-md text-sm font-bold flex items-center justify-center gap-1" style={{ background: TEAL, color: INK }}>
              <Icon name="Plus" size={16} /> Agregar
            </button>
          </div>
        </form>
      </div>

      {/* Inventario */}
      <div className="px-5 max-w-6xl mx-auto mb-10">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-lg font-extrabold" style={{ color: CREAM, fontFamily: "'Baloo 2', sans-serif" }}>Inventario ({inventory.length})</h3>
          <button onClick={() => exportExcel(inventory, 'inventario.xlsx', 'Inventario')} className="text-xs font-bold flex items-center gap-1 px-3 py-1.5 rounded-md" style={{ border: '1px solid #4A2E1C', color: CREAM }}>
            <Icon name="Download" size={12} /> Exportar Excel
          </button>
        </div>
        <div className="overflow-x-auto rounded-md" style={{ border: '1px solid #4A2E1C' }}>
          <table className="w-full text-xs" style={{ color: '#E8DAC0' }}>
            <thead>
              <tr style={{ background: '#241509' }}>
                {['Código', 'Marca / modelo', 'Talla', 'Precio', 'Vendedor', 'Estado', ''].map((h) => (
                  <th key={h} className="text-left px-3 py-2 font-bold" style={{ color: '#C9B49A' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {inventory.map((it) => (
                <tr key={it.id} style={{ borderTop: '1px solid #4A2E1C' }}>
                  <td className="px-3 py-2 font-mono" style={{ color: TEAL }}>{it.serial}</td>
                  <td className="px-3 py-2">{it.brand} {it.model} {it.colorway ? `· ${it.colorway}` : ''}</td>
                  <td className="px-3 py-2">{it.size}</td>
                  <td className="px-3 py-2">{fmtCOP(it.price)}</td>
                  <td className="px-3 py-2">{it.sellerName}</td>
                  <td className="px-3 py-2">
                    <span className="px-2 py-0.5 rounded-full text-[10px] font-bold" style={it.status === 'disponible' ? { background: TEAL + '30', color: TEAL } : { background: '#E8846B30', color: '#E8846B' }}>
                      {it.status}
                    </span>
                  </td>
                  <td className="px-3 py-2">
                    <div className="flex gap-2">
                      {it.status === 'disponible' && (
                        <button onClick={() => openSellModal(it)} className="text-[10px] font-bold px-2 py-1 rounded" style={{ background: TEAL, color: INK }}>
                          Vender
                        </button>
                      )}
                      <button onClick={() => removeItem(it.id)} title="Eliminar">
                        <Icon name="Trash2" size={14} color="#E8846B" />
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Ventas */}
      <div className="px-5 max-w-6xl mx-auto pb-14">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-lg font-extrabold" style={{ color: CREAM, fontFamily: "'Baloo 2', sans-serif" }}>Historial de ventas ({sales.length})</h3>
          <button onClick={() => exportExcel(sales, 'ventas.xlsx', 'Ventas')} className="text-xs font-bold flex items-center gap-1 px-3 py-1.5 rounded-md" style={{ border: '1px solid #4A2E1C', color: CREAM }}>
            <Icon name="Download" size={12} /> Exportar Excel
          </button>
        </div>
        <div className="overflow-x-auto rounded-md" style={{ border: '1px solid #4A2E1C' }}>
          <table className="w-full text-xs" style={{ color: '#E8DAC0' }}>
            <thead>
              <tr style={{ background: '#241509' }}>
                {['Código', 'Producto', 'Comprador', 'Vendedor a pagar', 'Precio venta', 'Comisión', 'Le corresponde', 'Fecha'].map((h) => (
                  <th key={h} className="text-left px-3 py-2 font-bold" style={{ color: '#C9B49A' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sales.map((s) => (
                <tr key={s.id} style={{ borderTop: '1px solid #4A2E1C' }}>
                  <td className="px-3 py-2 font-mono" style={{ color: TEAL }}>{s.serial}</td>
                  <td className="px-3 py-2">{s.resumen}</td>
                  <td className="px-3 py-2">{s.buyerContact}</td>
                  <td className="px-3 py-2">{s.sellerName} ({s.sellerContact})</td>
                  <td className="px-3 py-2">{fmtCOP(s.salePrice)}</td>
                  <td className="px-3 py-2">{fmtCOP(s.commission)}</td>
                  <td className="px-3 py-2 font-bold">{fmtCOP(s.sellerPayout)}</td>
                  <td className="px-3 py-2">{s.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
